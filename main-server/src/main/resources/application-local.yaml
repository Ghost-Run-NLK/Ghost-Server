spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ghost?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:dev-local-only-secret-please-change-in-prod-must-be-at-least-32-bytes}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:604800}

logging:
  level:
    org.hibernate.SQL: debug
